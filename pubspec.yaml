name: simrs_dokter
description: "Aplikasi Mobile Dokter"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  fl_chart: ^1.2.0

  # State Management
  get: ^4.6.6

  # HTTP & Networking
  dio: ^5.7.0
  connectivity_plus: ^7.1.1

  # Storage & Auth
  flutter_secure_storage: ^10.3.1
  shared_preferences: ^2.3.2

  # Utils
  intl: ^0.20.2
  timeago: ^3.7.0
  pull_to_refresh: ^2.0.0
  badges: ^3.1.2
  dotted_border: ^3.1.0
  url_launcher: ^6.3.1
  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/CareDoc_EMR.png"
  min_sdk_android: 21
