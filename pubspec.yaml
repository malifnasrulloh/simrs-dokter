name: simrs_dokter
description: "SIMRS RSI Aminah - Aplikasi Mobile Dokter"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  fl_chart: ^0.69.0

  # State Management
  get: ^4.6.6

  # HTTP & Networking
  dio: ^5.7.0
  connectivity_plus: ^6.1.0

  # Storage & Auth
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

  # Utils
  intl: ^0.19.0
  timeago: ^3.7.0
  pull_to_refresh: ^2.0.0
  badges: ^3.1.2
  dotted_border: ^2.1.0
  url_launcher: ^6.3.1
  webview_flutter: ^4.10.0
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - .env
